# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# DATABASE (Default: H2 In-Memory for Zero-Config)
# ===============================
spring.datasource.url=jdbc:h2:mem:wellness_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# OPTIONAL MYSQL (commented)
# ===============================
# spring.datasource.url=jdbc:mysql://localhost:3306/wellness_marketplace?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=***REMOVED***
# spring.datasource.password=***REMOVED***123
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / SQL INIT
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===============================
# JWT
# ===============================
jwt.secret=***REMOVED***
jwt.expiration=86400000

# ===============================
# EMAIL (GMAIL SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=***REMOVED***
spring.mail.password=***REMOVED***
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=***REMOVED***

logging.level.org.springframework.mail=INFO

# ===============================
# SENDGRID
# ===============================
SENDGRID_API_KEY=***REMOVED***      